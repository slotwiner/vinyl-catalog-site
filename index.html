<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vinyl Catalog</title>
<script src="records.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #e0e0e0; }
header { background: #111; padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
header h1 { font-size: 1.4rem; font-weight: 600; color: #fff; flex-shrink: 0; }
#search-bar { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
#search-bar input, #search-bar select { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 6px; padding: 6px 10px; font-size: 0.9rem; }
#search-bar input[type=text] { flex: 1; min-width: 160px; }
#stats { padding: 8px 24px; font-size: 0.8rem; color: #888; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; padding: 16px 24px; }
.card { background: #242424; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #333; display: block; }
.card .no-img { width: 100%; aspect-ratio: 1; background: #2e2e2e; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2rem; }
.card-body { padding: 10px; }
.card-artist { font-size: 0.78rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-album { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.card-meta { font-size: 0.72rem; color: #777; margin-top: 4px; }
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal { background: #242424; border-radius: 10px; max-width: 700px; width: 95vw; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
#modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #aaa; font-size: 1.4rem; cursor: pointer; }
#modal-header { display: flex; gap: 18px; margin-bottom: 18px; }
#modal-cover { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #333; }
#modal-cover-placeholder { width: 120px; height: 120px; background: #2e2e2e; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2.5rem; }
#modal-title { flex: 1; display: flex; flex-direction: column; justify-content: center; }
#modal h2 { font-size: 1.2rem; margin-bottom: 4px; }
#modal .modal-artist { color: #aaa; font-size: 0.95rem; }
#modal .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; font-size: 0.85rem; margin-bottom: 16px; }
#modal .detail-grid dt { color: #888; }
.notes-block { font-size: 0.85rem; color: #bbb; line-height: 1.6; margin-bottom: 14px; }
.see-more-btn { background: none; border: none; color: #4a90d9; cursor: pointer; font-size: 0.8rem; padding: 2px 0; margin-top: 4px; display: block; }
.tracks-toggle { background: none; border: none; color: #4a90d9; cursor: pointer; font-size: 0.85rem; padding: 0; margin-bottom: 8px; }
.tracklist { display: none; font-size: 0.82rem; margin-bottom: 8px; }
.tracklist.open { display: block; }
.tracklist li { padding: 4px 0; border-bottom: 1px solid #2e2e2e; list-style: none; display: flex; gap: 8px; }
.tracklist li:last-child { border: none; }
.track-pos { color: #666; width: 28px; flex-shrink: 0; }
.track-title { flex: 1; }
.track-dur { color: #666; }
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.68rem;font-weight:600;text-transform:uppercase;}
.badge-needs_review{background:#4a3a00;color:#ffb74d;}
.badge-verified{background:#1a3a5c;color:#64b5f6;}
.badge-locked{background:#4a1a1a;color:#ef5350;}
#rec-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;}
#rec-overlay.open{display:flex;}
#rec-modal{background:#1e1e1e;border-radius:12px;max-width:680px;width:95vw;max-height:90vh;overflow-y:auto;padding:24px;position:relative;}
#rec-modal h2{font-size:1.1rem;margin-bottom:16px;}
#rec-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#aaa;font-size:1.4rem;cursor:pointer;}
.rec-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #333;}
.rec-tab{background:none;border:none;color:#888;padding:8px 16px;cursor:pointer;font-size:0.9rem;border-bottom:2px solid transparent;margin-bottom:-1px;}
.rec-tab.active{color:#fff;border-bottom-color:#4a90d9;}
.rec-mode{display:none;}
.rec-mode.active{display:block;}
#rec-input{width:100%;background:#2a2a2a;color:#e0e0e0;border:1px solid #444;border-radius:6px;padding:10px;font-size:0.95rem;resize:none;margin-bottom:10px;box-sizing:border-box;}
.rec-submit{background:#4a90d9;color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:0.9rem;}
.rec-submit:disabled{background:#333;color:#666;cursor:default;}
.rec-submit:hover:not(:disabled){background:#357abd;}
.guided-section{margin-bottom:16px;}
.guided-section h4{font-size:0.75rem;text-transform:uppercase;color:#666;margin-bottom:8px;letter-spacing:0.05em;}
.guided-pills{display:flex;flex-wrap:wrap;gap:6px;}
.guided-pill{padding:5px 12px;border-radius:16px;border:1px solid #333;background:none;color:#aaa;cursor:pointer;font-size:0.82rem;}
.guided-pill:hover{border-color:#4a90d9;color:#4a90d9;}
.guided-pill.selected{border-color:#4a90d9;background:rgba(74,144,217,0.15);color:#4a90d9;}
#rec-results{margin-top:16px;}
.rec-loading{color:#888;font-size:0.9rem;padding:12px 0;}
.rec-card{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #2a2a2a;align-items:flex-start;}
.rec-card:last-child{border:none;}
.rec-cover{width:64px;height:64px;border-radius:4px;flex-shrink:0;object-fit:cover;}
.rec-cover-ph{width:64px;height:64px;background:#2e2e2e;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#555;font-size:1.4rem;}
.rec-info{flex:1;}
.rec-artist{font-size:0.8rem;color:#aaa;}
.rec-album{font-size:0.95rem;font-weight:600;margin:2px 0;}
.rec-reason{font-size:0.82rem;color:#bbb;line-height:1.5;}
.rec-location{font-size:0.78rem;color:#4a90d9;margin-top:4px;}
@media(max-width:600px){
  header{flex-direction:column;align-items:stretch;padding:12px;}
  #search-bar{flex-direction:column;}
  #grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px 12px;}
  #modal{padding:16px;}
  #modal .detail-grid{grid-template-columns:1fr;}
  #modal-header{flex-direction:column;align-items:center;}
  #modal-cover,#modal-cover-placeholder{width:160px;height:160px;}
}
</style>
</head>
<body>
<header>
  <h1>Vinyl Catalog</h1>
  <div id="search-bar">
    <input type="text" id="q" placeholder="Search artist, album, label..." oninput="render()">
    <select id="genre-filter" onchange="render()"><option value="">All genres</option></select>
    <select id="location-filter" onchange="render()"><option value="">All locations</option></select>
    <select id="sort-filter" onchange="render()">
      <option value="artist">Sort: Artist</option>
      <option value="album">Sort: Album</option>
      <option value="year">Sort: Year</option>
    </select>
    <button onclick="openRec()" style="background:#2a5a8a;color:#fff;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:0.9rem;">Recommend</button>
  </div>
</header>
<div id="stats"></div>
<div id="grid"></div>
<div id="rec-overlay">
  <div id="rec-modal">
    <button id="rec-close" onclick="closeRec()">&#x2715;</button>
    <h2>What do you want to hear?</h2>
    <div class="rec-tabs">
      <button class="rec-tab active" onclick="switchRecMode('freeform')">Freeform</button>
      <button class="rec-tab" onclick="switchRecMode('guided')">Guided</button>
    </div>
    <div class="rec-mode active" id="rec-mode-freeform">
      <textarea id="rec-input" rows="3" placeholder="e.g. something mellow for a Sunday morning, upbeat jazz for cooking dinner, dark 70s rock..."></textarea>
      <button class="rec-submit" id="rec-submit" onclick="getRecommendations()">Find Records</button>
    </div>
    <div class="rec-mode" id="rec-mode-guided">
      <div class="guided-section">
        <h4>Mood</h4>
        <div class="guided-pills" data-group="mood">
          <button class="guided-pill" data-val="fun &amp; upbeat">Fun</button>
          <button class="guided-pill" data-val="contemplative &amp; thoughtful">Contemplative</button>
          <button class="guided-pill" data-val="mellow &amp; relaxed">Mellow</button>
          <button class="guided-pill" data-val="energetic &amp; driving">Energetic</button>
          <button class="guided-pill" data-val="moody &amp; dark">Moody</button>
          <button class="guided-pill" data-val="romantic &amp; warm">Romantic</button>
          <button class="guided-pill" data-val="dreamy &amp; atmospheric">Dreamy</button>
          <button class="guided-pill" data-val="raw &amp; gritty">Raw</button>
          <button class="guided-pill" data-val="joyful &amp; celebratory">Joyful</button>
          <button class="guided-pill" data-val="groovy &amp; head-nodding">Groovy</button>
          <button class="guided-pill" data-val="melancholy &amp; bittersweet">Melancholy</button>
          <button class="guided-pill" data-val="intense &amp; cathartic">Intense</button>
          <button class="guided-pill" data-val="cinematic &amp; sweeping">Cinematic</button>
          <button class="guided-pill" data-val="weird &amp; surprising">Weird</button>
        </div>
      </div>
      <div class="guided-section">
        <h4>Sound</h4>
        <div class="guided-pills" data-group="sound">
          <button class="guided-pill" data-val="jazzy">Jazz</button>
          <button class="guided-pill" data-val="rock">Rock</button>
          <button class="guided-pill" data-val="electronic / synth">Electronic</button>
          <button class="guided-pill" data-val="world music / global sounds">World</button>
          <button class="guided-pill" data-val="soul / funk / R&amp;B">Soul / Funk</button>
          <button class="guided-pill" data-val="experimental / avant-garde">Experimental</button>
          <button class="guided-pill" data-val="pop / singer-songwriter">Pop</button>
          <button class="guided-pill" data-val="reggae / dub">Reggae / Dub</button>
          <button class="guided-pill" data-val="punk / post-punk">Punk</button>
          <button class="guided-pill" data-val="hip hop / rap">Hip Hop</button>
          <button class="guided-pill" data-val="classical / orchestral">Classical</button>
          <button class="guided-pill" data-val="psychedelic">Psychedelic</button>
          <button class="guided-pill" data-val="ambient / new age">Ambient</button>
          <button class="guided-pill" data-val="folk / acoustic">Folk</button>
          <button class="guided-pill" data-val="surprise me">Surprise Me</button>
        </div>
      </div>
      <div class="guided-section">
        <h4>Activity</h4>
        <div class="guided-pills" data-group="activity">
          <button class="guided-pill" data-val="cooking dinner">Cooking</button>
          <button class="guided-pill" data-val="working / focusing">Working</button>
          <button class="guided-pill" data-val="relaxing on the couch">Relaxing</button>
          <button class="guided-pill" data-val="hosting friends">Having People Over</button>
          <button class="guided-pill" data-val="reading">Reading</button>
          <button class="guided-pill" data-val="deep listening, full attention">Deep Listening</button>
          <button class="guided-pill" data-val="cleaning / chores">Cleaning</button>
          <button class="guided-pill" data-val="just woke up, morning vibes">Morning</button>
          <button class="guided-pill" data-val="winding down for the night">Late Night</button>
          <button class="guided-pill" data-val="getting ready to go out">Getting Ready</button>
          <button class="guided-pill" data-val="doing nothing, just vibing">Just Vibing</button>
          <button class="guided-pill" data-val="dinner party">Dinner Party</button>
        </div>
      </div>
      <button class="rec-submit" id="rec-guided-submit" onclick="getGuidedRecommendations()">Find Records</button>
    </div>
    <div id="rec-results"></div>
  </div>
</div>
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">&#x2715;</button>
    <div id="modal-header">
      <span id="modal-cover-placeholder" style="display:none">&#9899;</span>
      <img id="modal-cover" style="display:none" alt="">
      <div id="modal-title">
        <h2 id="modal-album"></h2>
        <div class="modal-artist" id="modal-artist"></div>
      </div>
    </div>
    <dl class="detail-grid" id="modal-details"></dl>
    <div id="modal-notes"></div>
    <div id="modal-tracks"></div>
  </div>
</div>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function imgSrc(r){return r.cover_image_url||r.image_file||null;}
function toggleLabel(btn){var uid=btn.getAttribute('data-target');var e=document.getElementById(uid);e.style.display=e.style.display==='none'?'inline':'none';}
function labelHtml(label){
  if(!label)return null;
  const parts=label.split(',').map(s=>s.trim()).filter(Boolean);
  if(parts.length<=1)return esc(parts[0]||'');
  const uid='lbl'+Math.random().toString(36).slice(2);
  return esc(parts[0])+' <button onclick="toggleLabel(this)" data-target="'+uid+'" style="background:none;border:none;color:#4a90d9;cursor:pointer;font-size:0.75rem;padding:0">+'+(parts.length-1)+' more</button><span id="'+uid+'" style="display:none"> · '+parts.slice(1).map(esc).join(', ')+'</span>';
}
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const genre=document.getElementById('genre-filter').value;
  const location=document.getElementById('location-filter').value;
  const sort=document.getElementById('sort-filter').value;
  let recs=RECORDS.filter(r=>{
    if(q&&!((r.artist||'').toLowerCase().includes(q)||(r.album||'').toLowerCase().includes(q)||(r.label||'').toLowerCase().includes(q)||(r.location||'').toLowerCase().includes(q)))return false;
    if(genre&&!(r.genre||'').includes(genre))return false;
    if(location&&(r.location||'')!==location)return false;
    return true;
  });
  recs.sort((a,b)=>(a[sort]||'').localeCompare(b[sort]||''));
  document.getElementById('stats').textContent=recs.length+' record'+(recs.length!==1?'s':'');
  document.getElementById('grid').innerHTML=recs.map(r=>{
    const src=imgSrc(r);
    const img=src?`<img src="${esc(src)}" loading="lazy" alt="${esc(r.album||'')}">`:'<div class="no-img">&#9899;</div>';
    return `<div class="card" onclick="openModal(${r.id})">${img}<div class="card-body"><div class="card-artist">${esc(r.artist)}</div><div class="card-album">${esc(r.album)}</div><div class="card-meta">${esc(r.year||'')}${r.label?' · '+esc(r.label.split(',')[0].trim()):''}</div></div></div>`;
  }).join('');
}
function openModal(id){
  const r=RECORDS.find(x=>x.id===id);
  if(!r)return;
  document.getElementById('modal-album').textContent=r.album||'';
  document.getElementById('modal-artist').textContent=r.artist||'';
  const src=imgSrc(r);
  const cover=document.getElementById('modal-cover');
  const ph=document.getElementById('modal-cover-placeholder');
  if(src){cover.src=src;cover.style.display='block';ph.style.display='none';}
  else{cover.style.display='none';ph.style.display='flex';}
  const fields=[['Location',r.location],['Year',r.year],['Label',labelHtml(r.label)],['Genre',r.genre],['Style',r.style],['Format',r.format],['Pressing',r.pressing],['Catalog#',r.catalog_number],['Condition',r.condition],['Price',r.price],['Status',r.status],['Discogs',r.discogs_url?`<a href="${esc(r.discogs_url)}" target="_blank" style="color:#4a90d9">View on Discogs</a>`:null]];
  document.getElementById('modal-details').innerHTML=fields.filter(([,v])=>v).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${v}</dd>`).join('');
  const notesEl=document.getElementById('modal-notes');
  const NL=200;
  if(r.notes&&r.notes.length>NL){
    notesEl.innerHTML=`<div class="notes-block"><span id="ns">${esc(r.notes.slice(0,NL))}&hellip;</span><span id="nf" style="display:none">${esc(r.notes)}</span><button class="see-more-btn" onclick="var s=document.getElementById('ns'),f=document.getElementById('nf'),b=this,x=f.style.display!=='none';s.style.display=x?'inline':'none';f.style.display=x?'none':'inline';b.textContent=x?'See more':'See less'">See more</button></div>`;
  }else{notesEl.innerHTML=r.notes?`<div class="notes-block">${esc(r.notes)}</div>`:'';}
  const tracksEl=document.getElementById('modal-tracks');
  if(r.tracklist&&r.tracklist.length){
    const items=r.tracklist.map(t=>`<li><span class="track-pos">${esc(t.position)}</span><span class="track-title">${esc(t.title)}</span>${t.duration?`<span class="track-dur">${esc(t.duration)}</span>`:''}</li>`).join('');
    tracksEl.innerHTML=`<button class="tracks-toggle" onclick="var l=this.nextElementSibling;l.classList.toggle('open');this.textContent=l.classList.contains('open')?'▼ Tracks (${r.tracklist.length})':'▶ Tracks (${r.tracklist.length})'">&#9654; Tracks (${r.tracklist.length})</button><ul class="tracklist">${items}</ul>`;
  }else{tracksEl.innerHTML='';}
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeRec();}});
const genres=[...new Set(RECORDS.flatMap(r=>r.genre?r.genre.split(', '):[]))].sort();
const sel=document.getElementById('genre-filter');
genres.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;sel.appendChild(o);});
const locations=[...new Set(RECORDS.map(r=>r.location).filter(Boolean))].sort();
const locSel=document.getElementById('location-filter');
locations.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;locSel.appendChild(o);});
render();
// --- Recommend ---
const RECOMMEND_URL='https://falling-king-da9b.slotwiner.workers.dev'; // Cloudflare Worker
function openRec(){document.getElementById('rec-overlay').classList.add('open');document.getElementById('rec-input').focus();}
function closeRec(){document.getElementById('rec-overlay').classList.remove('open');}
function switchRecMode(mode){
  document.querySelectorAll('.rec-tab').forEach((t,i)=>t.classList.toggle('active',(mode==='freeform'&&i===0)||(mode==='guided'&&i===1)));
  document.getElementById('rec-mode-freeform').classList.toggle('active',mode==='freeform');
  document.getElementById('rec-mode-guided').classList.toggle('active',mode==='guided');
  document.getElementById('rec-results').innerHTML='';
  if(mode==='freeform')document.getElementById('rec-input').focus();
}
document.addEventListener('click',e=>{
  if(!e.target.classList.contains('guided-pill'))return;
  const g=e.target.closest('.guided-pills');
  const was=e.target.classList.contains('selected');
  g.querySelectorAll('.guided-pill').forEach(p=>p.classList.remove('selected'));
  if(!was)e.target.classList.add('selected');
});
function buildCatalog(){
  return RECORDS.map(r=>{
    let s=(r.artist||'')+' — '+(r.album||'');
    const p=[r.year,r.genre,r.style,r.location].filter(Boolean);
    if(p.length)s+=' ['+p.join(', ')+']';
    return s;
  }).join('
');
}
function renderRec(recs){
  const container=document.getElementById('rec-results');
  if(!recs.length){container.innerHTML='<div class="rec-loading">No recommendations found. Try different options.</div>';return;}
  container.innerHTML=recs.map(rec=>{
    const match=RECORDS.find(r=>(r.artist||'').toLowerCase()===(rec.artist||'').toLowerCase()&&(r.album||'').toLowerCase()===(rec.album||'').toLowerCase());
    const src=match?imgSrc(match):null;
    const coverHtml=src?`<img class="rec-cover" src="${esc(src)}" alt="">`:'<div class="rec-cover-ph">&#9899;</div>';
    const loc=rec.location||(match&&match.location)||'';
    return `<div class="rec-card">${coverHtml}<div class="rec-info"><div class="rec-artist">${esc(rec.artist||'')}</div><div class="rec-album">${esc(rec.album||'')}</div><div class="rec-reason">${esc(rec.reason||'')}</div>${loc?`<div class="rec-location">&#9679; ${esc(loc)}</div>`:''}</div></div>`;
  }).join('');
}
async function _fetchRec(prompt){
  if(!RECOMMEND_URL)throw new Error('Recommendation service not configured. See README to deploy the Cloudflare Worker.');
  const resp=await fetch(RECOMMEND_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,catalog:buildCatalog()})});
  return resp.json();
}
async function getRecommendations(){
  const prompt=document.getElementById('rec-input').value.trim();
  if(!prompt)return;
  const btn=document.getElementById('rec-submit');
  document.getElementById('rec-results').innerHTML='<div class="rec-loading">Finding the perfect records…</div>';
  btn.disabled=true;btn.textContent='Thinking…';
  try{renderRec(await _fetchRec(prompt));}
  catch(err){document.getElementById('rec-results').innerHTML='<div class="rec-loading" style="color:#ef5350">'+esc(err.message)+'</div>';}
  btn.disabled=false;btn.textContent='Find Records';
}
async function getGuidedRecommendations(){
  const parts=[];
  document.querySelectorAll('.guided-pills').forEach(g=>{const s=g.querySelector('.guided-pill.selected');if(s)parts.push(s.dataset.val);});
  if(!parts.length)return;
  const btn=document.getElementById('rec-guided-submit');
  document.getElementById('rec-results').innerHTML='<div class="rec-loading">Finding the perfect records…</div>';
  btn.disabled=true;btn.textContent='Thinking…';
  try{renderRec(await _fetchRec(parts.join('. ')+'.')); }
  catch(err){document.getElementById('rec-results').innerHTML='<div class="rec-loading" style="color:#ef5350">'+esc(err.message)+'</div>';}
  btn.disabled=false;btn.textContent='Find Records';
}
