<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vinyl Catalog</title>
<script src="records.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #e0e0e0; }
header { background: #111; padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #333; }
header h1 { font-size: 1.4rem; font-weight: 600; color: #fff; flex-shrink: 0; }
#search-bar { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
#search-bar input, #search-bar select { background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 6px; padding: 6px 10px; font-size: 0.9rem; }
#search-bar input[type=text] { flex: 1; min-width: 160px; }
#stats { padding: 8px 24px; font-size: 0.8rem; color: #888; }
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; padding: 16px 24px; }
.card { background: #242424; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #333; display: block; }
.card .no-img { width: 100%; aspect-ratio: 1; background: #2e2e2e; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2rem; }
.card-body { padding: 10px; }
.card-artist { font-size: 0.78rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-album { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.card-meta { font-size: 0.72rem; color: #777; margin-top: 4px; }
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal { background: #242424; border-radius: 10px; max-width: 700px; width: 95vw; max-height: 90vh; overflow-y: auto; padding: 24px; position: relative; }
#modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #aaa; font-size: 1.4rem; cursor: pointer; }
#modal-header { display: flex; gap: 18px; margin-bottom: 18px; }
#modal-cover { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #333; }
#modal-cover-placeholder { width: 120px; height: 120px; background: #2e2e2e; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2.5rem; }
#modal-title { flex: 1; display: flex; flex-direction: column; justify-content: center; }
#modal h2 { font-size: 1.2rem; margin-bottom: 4px; }
#modal .modal-artist { color: #aaa; font-size: 0.95rem; }
#modal .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; font-size: 0.85rem; margin-bottom: 16px; }
#modal .detail-grid dt { color: #888; }
.notes-block { font-size: 0.85rem; color: #bbb; line-height: 1.6; margin-bottom: 14px; }
.see-more-btn { background: none; border: none; color: #4a90d9; cursor: pointer; font-size: 0.8rem; padding: 2px 0; margin-top: 4px; display: block; }
.tracks-toggle { background: none; border: none; color: #4a90d9; cursor: pointer; font-size: 0.85rem; padding: 0; margin-bottom: 8px; }
.tracklist { display: none; font-size: 0.82rem; margin-bottom: 8px; }
.tracklist.open { display: block; }
.tracklist li { padding: 4px 0; border-bottom: 1px solid #2e2e2e; list-style: none; display: flex; gap: 8px; }
.tracklist li:last-child { border: none; }
.track-pos { color: #666; width: 28px; flex-shrink: 0; }
.track-title { flex: 1; }
.track-dur { color: #666; }
</style>
</head>
<body>
<header>
  <h1>Vinyl Catalog</h1>
  <div id="search-bar">
    <input type="text" id="q" placeholder="Search artist, album, label..." oninput="render()">
    <select id="genre-filter" onchange="render()"><option value="">All genres</option></select>
    <select id="sort-filter" onchange="render()">
      <option value="artist">Sort: Artist</option>
      <option value="album">Sort: Album</option>
      <option value="year">Sort: Year</option>
    </select>
  </div>
</header>
<div id="stats"></div>
<div id="grid"></div>
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" onclick="closeModal()">&#x2715;</button>
    <div id="modal-header">
      <span id="modal-cover-placeholder" style="display:none">&#9899;</span>
      <img id="modal-cover" style="display:none" alt="">
      <div id="modal-title">
        <h2 id="modal-album"></h2>
        <div class="modal-artist" id="modal-artist"></div>
      </div>
    </div>
    <dl class="detail-grid" id="modal-details"></dl>
    <div id="modal-notes"></div>
    <div id="modal-tracks"></div>
  </div>
</div>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function imgSrc(r){return r.cover_image_url||r.image_file||null;}
function labelHtml(label){
  if(!label)return null;
  const parts=label.split(',').map(s=>s.trim()).filter(Boolean);
  if(parts.length<=1)return esc(parts[0]||'');
  const uid='lbl'+Math.random().toString(36).slice(2);
  return esc(parts[0])+' <button onclick="var e=document.getElementById(''+uid+'');e.style.display=e.style.display==='none'?'inline':'none'" style="background:none;border:none;color:#4a90d9;cursor:pointer;font-size:0.75rem;padding:0">+'+( parts.length-1)+' more</button><span id="'+uid+'" style="display:none"> · '+parts.slice(1).map(esc).join(', ')+'</span>';
}
function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const genre=document.getElementById('genre-filter').value;
  const sort=document.getElementById('sort-filter').value;
  let recs=RECORDS.filter(r=>{
    if(q&&!((r.artist||'').toLowerCase().includes(q)||(r.album||'').toLowerCase().includes(q)||(r.label||'').toLowerCase().includes(q)))return false;
    if(genre&&!(r.genre||'').includes(genre))return false;
    return true;
  });
  recs.sort((a,b)=>(a[sort]||'').localeCompare(b[sort]||''));
  document.getElementById('stats').textContent=recs.length+' record'+(recs.length!==1?'s':'');
  document.getElementById('grid').innerHTML=recs.map(r=>{
    const src=imgSrc(r);
    const img=src?`<img src="${esc(src)}" loading="lazy" alt="${esc(r.album||'')}">`:'<div class="no-img">&#9899;</div>';
    return `<div class="card" onclick="openModal(${r.id})">${img}<div class="card-body"><div class="card-artist">${esc(r.artist)}</div><div class="card-album">${esc(r.album)}</div><div class="card-meta">${esc(r.year||'')}${r.label?' · '+esc(r.label.split(',')[0].trim()):''}</div></div></div>`;
  }).join('');
}
function openModal(id){
  const r=RECORDS.find(x=>x.id===id);
  if(!r)return;
  document.getElementById('modal-album').textContent=r.album||'';
  document.getElementById('modal-artist').textContent=r.artist||'';
  const src=imgSrc(r);
  const cover=document.getElementById('modal-cover');
  const ph=document.getElementById('modal-cover-placeholder');
  if(src){cover.src=src;cover.style.display='block';ph.style.display='none';}
  else{cover.style.display='none';ph.style.display='flex';}
  const fields=[['Year',r.year],['Label',labelHtml(r.label)],['Genre',r.genre],['Style',r.style],['Format',r.format],['Pressing',r.pressing],['Catalog#',r.catalog_number],['Condition',r.condition],['Price',r.price],['Status',r.status],['Discogs',r.discogs_url?`<a href="${esc(r.discogs_url)}" target="_blank" style="color:#4a90d9">View on Discogs</a>`:null]];
  document.getElementById('modal-details').innerHTML=fields.filter(([,v])=>v).map(([k,v])=>`<dt>${esc(k)}</dt><dd>${v}</dd>`).join('');
  const notesEl=document.getElementById('modal-notes');
  const NL=200;
  if(r.notes&&r.notes.length>NL){
    notesEl.innerHTML=`<div class="notes-block"><span id="ns">${esc(r.notes.slice(0,NL))}&hellip;</span><span id="nf" style="display:none">${esc(r.notes)}</span><button class="see-more-btn" onclick="var s=document.getElementById('ns'),f=document.getElementById('nf'),b=this,x=f.style.display!=='none';s.style.display=x?'inline':'none';f.style.display=x?'none':'inline';b.textContent=x?'See more':'See less'">See more</button></div>`;
  }else{notesEl.innerHTML=r.notes?`<div class="notes-block">${esc(r.notes)}</div>`:'';}
  const tracksEl=document.getElementById('modal-tracks');
  if(r.tracklist&&r.tracklist.length){
    const items=r.tracklist.map(t=>`<li><span class="track-pos">${esc(t.position)}</span><span class="track-title">${esc(t.title)}</span>${t.duration?`<span class="track-dur">${esc(t.duration)}</span>`:''}</li>`).join('');
    tracksEl.innerHTML=`<button class="tracks-toggle" onclick="var l=this.nextElementSibling;l.classList.toggle('open');this.textContent=l.classList.contains('open')?'▼ Tracks (${r.tracklist.length})':'▶ Tracks (${r.tracklist.length})'">&#9654; Tracks (${r.tracklist.length})</button><ul class="tracklist">${items}</ul>`;
  }else{tracksEl.innerHTML='';}
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
const genres=[...new Set(RECORDS.flatMap(r=>r.genre?r.genre.split(', '):[]))].sort();
const sel=document.getElementById('genre-filter');
genres.forEach(g=>{const o=document.createElement('option');o.value=g;o.textContent=g;sel.appendChild(o);});
render();
</script>
</body>
</html>
